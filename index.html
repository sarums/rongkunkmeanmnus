<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RongKunKmeanMnus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ TOAST ═══ -->
  <div id="toast"></div>

  <!-- ═══════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════ -->
  <div id="navbar">
    <div id="nav-inner">
      <div class="nav-left">
        <a href="#" onclick="goHome(event)" class="nav-logo">
          <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <span class="nav-logo-text" id="site-name">RongKun</span>
        </a>
        <nav class="nav-links" id="nav-cats"></nav>
      </div>

      <div class="nav-right">
        <div class="search-wrap" id="search-wrap">
          <input id="search-input" type="text" placeholder="Search..."
            onkeydown="if(event.key==='Enter') doSearch()">
          <button onclick="doSearch()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <button class="icon-btn" onclick="toggleSearch()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <a href="/admin" class="icon-btn" title="Admin">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
          </svg>
        </a>
        <button class="icon-btn hamburger" id="hamburger" onclick="toggleMobileMenu()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-search">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="mobile-search-input" type="text" placeholder="Search videos..."
          onkeydown="if(event.key==='Enter') doSearch()">
      </div>
      <div class="mobile-cats" id="mobile-cats"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       HOME PAGE
  ═══════════════════════════════════════ -->
  <div id="page-home" class="page active">

    <!-- HERO -->
    <section id="hero" onclick="heroClick()">
      <img id="hero-img" src="" alt="">
      <div class="hero-grad-main"></div>
      <div class="hero-grad-side"></div>

      <div id="hero-content">
        <div class="hero-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          Featured
        </div>
        <h1 id="hero-title">Loading...</h1>
        <p id="hero-desc"></p>
        <div class="hero-meta">
          <span id="hero-cat" class="hero-cat"></span>
          <span id="hero-views" class="hero-views"></span>
        </div>
        <button class="watch-btn" onclick="event.stopPropagation(); heroClick()">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          Watch Now
        </button>
      </div>

      <div id="hero-dots"></div>
      <button class="hero-arrow" id="hero-prev" onclick="event.stopPropagation(); slideHero(-1)">&#8249;</button>
      <button class="hero-arrow" id="hero-next" onclick="event.stopPropagation(); slideHero(1)">&#8250;</button>
    </section>

    <!-- SECTIONS -->
    <div id="home-sections"></div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24" fill="#fff" width="14" height="14" style="transform:translateX(1px)">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </div>
        <span class="nav-logo-text" id="footer-name">RongKun</span>
      </div>
      <p class="footer-desc" id="footer-desc"></p>
      <div class="footer-links" id="footer-links"></div>
    </footer>
  </div>

  <!-- ═══════════════════════════════════════
       WATCH PAGE
  ═══════════════════════════════════════ -->
  <div id="page-watch" class="page watch-page">
    <div class="watch-layout">

      <!-- Left: Player + Info -->
      <div>
        <button class="back-btn" onclick="goBack()">
          <svg width="14" height="14" fill="none" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Back
        </button>

        <div class="player-wrap">
          <iframe id="player-iframe" allowfullscreen allow="autoplay"></iframe>
        </div>

        <div class="watch-source-row">
          <span id="watch-source" class="watch-source-badge"></span>
          <span id="watch-cat"    class="watch-cat-label"></span>
          <button id="watch-next-btn" class="watch-next-btn" onclick="playNext()" style="display:none">
            Next ›
          </button>
        </div>

        <h1 id="watch-title" class="watch-title"></h1>

        <div class="watch-meta">
          <div class="watch-stat">
            <label>Views</label>
            <span id="watch-views"></span>
          </div>
          <div class="watch-divider"></div>
          <div class="watch-stat">
            <label>Published</label>
            <span id="watch-date"></span>
          </div>
          <button class="share-btn" onclick="copyLink()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
            Share
          </button>
        </div>

        <p id="watch-desc" class="watch-desc"></p>
      </div>

      <!-- Right: Playlist + Suggested -->
      <div>
        <div class="playlist-panel" id="playlist-panel" style="display:none">
          <div class="playlist-header">
            <span class="playlist-label">Playlist</span>
            <span class="playlist-progress" id="playlist-progress"></span>
          </div>
          <div class="playlist-items hide-scroll" id="playlist-items"></div>
        </div>

        <h3 class="suggested-title">Suggested</h3>
        <div id="suggested-list"></div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════
       CATEGORY PAGE
  ═══════════════════════════════════════ -->
  <div id="page-cat" class="page">
    <div class="page-header">
      <div class="page-header-row">
        <div class="page-header-icon">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <div>
          <h1 class="page-header-title" id="cat-title"></h1>
          <p class="page-header-desc" id="cat-desc"></p>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="video-grid" id="cat-grid"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       SEARCH PAGE
  ═══════════════════════════════════════ -->
  <div id="page-search" class="page">
    <div class="page-header">
      <div class="page-header-row">
        <div class="page-header-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div>
          <h1 class="page-header-title">Search Results</h1>
          <p class="page-header-desc" id="search-info"></p>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="video-grid" id="search-grid"></div>
    </div>
  </div>

  <!-- ═══ SCRIPTS ═══ -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
