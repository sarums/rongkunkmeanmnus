/* ═══════════════════════════════════════════
   RongKunKmeanMnus — Main Stylesheet
   ═══════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap');

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOP PROGRESS BAR ── */
#nprogress { pointer-events:none; }
#nprogress-bar {
  background: var(--brand);
  position: fixed; z-index: 9999;
  top: 0; left: 0;
  width: 0%; height: 3px;
  transition: width .2s ease, opacity .4s ease;
  box-shadow: 0 0 10px var(--brand), 0 0 5px var(--brand);
  opacity: 0;
}
#nprogress-bar.running { opacity: 1; }
#nprogress-spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.15);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: np-spin .5s linear infinite;
  opacity: 0; transition: opacity .3s;
  flex-shrink: 0;
}
#nprogress-spinner.running { opacity: 1; }
@keyframes np-spin { to { transform: rotate(360deg); } }

:root {
  --brand: #f27d26;
  --bg: #0a0a0a;
  --bg2: #111111;
  --border: rgba(255,255,255,0.07);
  --text: #e4e4e7;
  --muted: #71717a;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Kantumruy Pro', 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

a { text-decoration: none; }
button, input, select, textarea { font-family: 'Kantumruy Pro', 'Outfit', sans-serif; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 9999px; }
.hide-scroll { scrollbar-width: none !important; }
.hide-scroll::-webkit-scrollbar { display: none !important; }

/* ── PAGES ── */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* ── TOAST ── */
#toast { position: fixed; top: 18px; right: 18px; z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 6px; }
.toast-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 9999px; font-size: .77rem; font-weight: 700; transform: translateX(140%); opacity: 0; transition: all .28s; pointer-events: none; }
.toast-item.show { transform: none; opacity: 1; }
.toast-item.ok   { background: #15803d; color: #fff; }
.toast-item.err  { background: #dc2626; color: #fff; }
.toast-item.info { background: #1d4ed8; color: #fff; }

/* ══ NAVBAR ══ */
#navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; transition: transform .3s ease; }



#nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; padding: 0 32px; background: rgba(8,8,8,1); border-bottom: 1px solid var(--border); }

.nav-logo { display: flex; align-items: center; gap: 9px; }
.nav-logo-icon { width: 30px; height: 30px; background: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.nav-logo-icon svg { fill: #fff; width: 12px; height: 12px; transform: translateX(1px); }
.nav-logo-text { font-size: 1.1rem; font-weight: 800; color: #fff; letter-spacing: -.02em; }

.nav-left { display: flex; align-items: center; }
.nav-links { display: flex; align-items: center; gap: 2px; margin-left: 20px; }
.nav-links a { font-size: .82rem; font-weight: 600; color: #999; padding: 5px 14px; border-radius: 9999px; transition: all .2s; }
.nav-links a:hover { color: #fff; }
.nav-links a.active { background: var(--brand); color: #000; font-weight: 700; }

.nav-right { display: flex; align-items: center; gap: 4px; }
.icon-btn { background: none; border: none; cursor: pointer; color: #999; padding: 7px; border-radius: 50%; transition: all .2s; display: flex; align-items: center; }
.icon-btn:hover { color: #fff; background: rgba(255,255,255,.07); }

.search-wrap { display: flex; align-items: center; background: #1c1c1c; border: 1px solid var(--border); border-radius: 9999px; overflow: hidden; width: 0; opacity: 0; transition: width .3s, opacity .3s; }
.search-wrap.open { width: 210px; opacity: 1; }
.search-wrap input { background: none; border: none; outline: none; color: #fff; font-size: .83rem; padding: 6px 14px; width: 100%; }
.search-wrap button { background: none; border: none; cursor: pointer; color: #777; padding: 0 12px 0 0; line-height: 1; }

.mobile-menu { display: none; background: rgba(8,8,8,.98); border-top: 1px solid var(--border); padding: 14px 20px 18px; }
.mobile-menu.open { display: block; }
.mobile-search { position: relative; margin-bottom: 12px; }
.mobile-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .4; }
.mobile-search input { width: 100%; background: #1c1c1c; border: 1px solid var(--border); border-radius: 9999px; padding: 8px 14px 8px 36px; color: #fff; font-size: .82rem; outline: none; }
.mobile-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
.mobile-cats a { font-size: .82rem; font-weight: 600; color: #888; padding: 4px 0; }
.mobile-cats a:hover { color: #fff; }

.hamburger { display: none !important; }
@media (max-width: 1023px) { .nav-links { display: none; } .hamburger { display: flex !important; } }

/* ══ HERO ══ */
#hero { position: relative; width: 100%; cursor: pointer; background: #000; overflow: hidden; }
@media (min-width: 641px) { #hero { height: 100vh; max-height: 820px; } }
@media (max-width: 640px) { #hero { height: 72vh; } }

#hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; transition: opacity .7s; }

.hero-grad-main { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.2) 40%, rgba(0,0,0,.85) 75%, #0a0a0a 100%); }
.hero-grad-side { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,.4) 0%, transparent 60%); }

#hero-content { position: absolute; bottom: 80px; left: 0; right: 0; padding: clamp(20px,4vw,52px); z-index: 2; }
@media (max-width: 640px) { #hero-content { bottom: 40px; } }

.hero-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--brand); color: #000; font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; padding: 4px 12px; border-radius: 9999px; margin-bottom: 12px; }
#hero-title { font-size: clamp(1.5rem,3.8vw,3.2rem); font-weight: 900; color: #fff; line-height: 1; letter-spacing: -.03em; margin-bottom: 10px; text-shadow: 0 2px 24px rgba(0,0,0,.8); max-width: 600px; }
#hero-desc { font-size: clamp(.78rem,.9vw,.9rem); color: rgba(255,255,255,.7); max-width: 460px; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.hero-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.hero-cat { font-size: .7rem; font-weight: 700; padding: 3px 10px; border: 1px solid rgba(255,255,255,.3); border-radius: 9999px; color: #ccc; }
.hero-views { font-size: .73rem; font-weight: 600; color: #999; }

.watch-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 26px; background: var(--brand); color: #000; font-size: .85rem; font-weight: 800; border-radius: 9999px; border: none; cursor: pointer; transition: all .2s; letter-spacing: -.01em; }
.watch-btn:hover { background: #fff; transform: scale(1.03); }
.watch-btn svg { fill: currentColor; width: 13px; height: 13px; transform: translateX(1px); }

#hero-dots { position: absolute; bottom: 18px; right: 32px; display: flex; gap: 5px; z-index: 3; }
.hero-dot { width: 6px; height: 6px; border-radius: 9999px; background: rgba(255,255,255,.3); border: none; cursor: pointer; padding: 0; transition: all .25s; }
.hero-dot.active { width: 22px; background: var(--brand); }

.hero-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; width: 38px; height: 38px; background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15); border-radius: 50%; color: #fff; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s, background .2s; outline: none; }
.hero-arrow:hover { background: var(--brand); border-color: var(--brand); }
#hero:hover .hero-arrow { opacity: 1; }
#hero-prev { left: 14px; }
#hero-next { right: 14px; }

/* ══ SECTIONS ══ */
#home-sections { max-width: 1560px; margin: 0 auto; padding: 24px 28px 60px; }
@media (max-width: 640px) { #home-sections { padding: 16px 12px 48px; } }

/* ── Recommended grid ── */
#recommended-section { max-width: 1560px; margin: 0 auto; padding: 0 28px 80px; }
@media (max-width: 640px) { #recommended-section { padding: 0 12px 80px; } }
#recommended-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
@media (max-width: 640px) { #recommended-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
.recommended-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.recommended-header .section-icon { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: .85rem; }
.recommended-header .section-title { font-size: 1rem; font-weight: 800; color: #fff; }
#recommended-loader { text-align: center; padding: 20px; color: #555; font-size: .82rem; }

.section { margin-bottom: 28px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-left { display: flex; align-items: center; gap: 10px; }
.section-icon { width: 36px; height: 36px; background: rgba(242,125,38,.12); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.section-title { font-size: 1.05rem; font-weight: 800; color: #fff; }
.section-more { font-size: .72rem; font-weight: 700; color: #666; display: flex; align-items: center; gap: 3px; letter-spacing: .06em; text-transform: uppercase; transition: color .2s; }
.section-more:hover { color: var(--brand); }

.row-wrap { position: relative; }
.row { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 2px; }
.row-btn { position: absolute; top: 50%; transform: translateY(-65%); z-index: 5; width: 34px; height: 54px; background: rgba(0,0,0,.75); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; color: #fff; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all .2s; outline: none; }
.row-btn:hover { background: var(--brand); border-color: var(--brand); }
.row-wrap:hover .row-btn { opacity: 1; }
.row-btn.prev { left: -14px; }
.row-btn.next { right: -14px; }

/* ══ VIDEO CARD ══ */
.vcard { flex: 0 0 calc(25% - 11px); min-width: 220px; cursor: pointer; display: block; }

/* ══ PLAYLIST CARD MULTI-THUMB (Netflix style) ══ */
.pl-multithumb { position:relative; aspect-ratio:16/9; border-radius:10px; overflow:hidden; background:#111; margin-bottom:8px; }
.pl-multithumb-grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; width:100%; height:100%; gap:2px; }
.pl-multithumb-grid img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }
.vcard:hover .pl-multithumb-grid img { transform:scale(1.06); }
.pl-multithumb-single img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
.vcard:hover .pl-multithumb-single img { transform:scale(1.06); }
.pl-multithumb-overlay { position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 55%);opacity:0;transition:opacity .3s; }
.vcard:hover .pl-multithumb-overlay { opacity:1; }
.pl-multithumb-play { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s; }
.vcard:hover .pl-multithumb-play { opacity:1; }
.pl-ep-badge { position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.82);color:#fff;font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.04em; }
.pl-series-badge { position:absolute;top:6px;left:6px;background:var(--brand);color:#000;font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase; }

/* ══ CONTINUE WATCHING ══ */
.cw-section { margin-bottom:32px; padding-bottom:32px; border-bottom:1px solid var(--border); }
.cw-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
.cw-card { flex:0 0 180px; width:180px; cursor:pointer; position:relative; display:flex; flex-direction:column; }
.cw-thumb { position:relative; width:180px; height:101px; border-radius:8px; overflow:hidden; background:#1a1a1a; margin-bottom:6px; flex-shrink:0; }
.cw-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.cw-card:hover .cw-thumb img { transform:scale(1.05); }
.cw-play { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .2s; }
.cw-card:hover .cw-play { opacity:1; }
.cw-play-icon { width:34px;height:34px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center; }
.cw-play-icon svg { fill:#fff;width:11px;height:11px;transform:translateX(1px); }
.cw-progress { position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15); }
.cw-progress-bar { height:100%;background:var(--brand);border-radius:0 3px 3px 0; width:40%; }
.cw-title { font-size:.72rem;font-weight:700;color:#bbb;width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3; }
.cw-card:hover .cw-title { color:var(--brand); }
.cw-meta { font-size:.65rem;color:#555;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
@media(max-width:640px){ .cw-card { flex:0 0 140px; width:140px; } .cw-thumb { width:140px; height:79px; } .cw-title { width:140px; } }
@media (max-width: 640px) { .vcard { flex: 0 0 calc(50% - 6px); min-width: 150px; } }

.vcard-thumb { position: relative; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #1a1a1a; margin-bottom: 8px; }
.vcard-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
.vcard:hover .vcard-thumb img { transform: scale(1.07); }
.vcard-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 55%); opacity: 0; transition: opacity .3s; }
.vcard:hover .vcard-overlay { opacity: 1; }
.vcard-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.vcard:hover .vcard-play { opacity: 1; }
.vcard-play-icon { width: 42px; height: 42px; background: rgba(242,125,38,.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 18px rgba(242,125,38,.4); }
.vcard-play-icon svg { fill: #fff; width: 14px; height: 14px; transform: translateX(1.5px); }
.vcard-duration { position: absolute; bottom: 6px; right: 6px; font-size: .62rem; font-weight: 700; background: rgba(0,0,0,.78); color: #fff; padding: 2px 6px; border-radius: 4px; }
.vcard-series { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,.72); color: #ddd; font-size: .6rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: .04em; }
.vcard-title { font-size: .82rem; font-weight: 700; color: #d4d4d8; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; transition: color .2s; }
.vcard:hover .vcard-title { color: var(--brand); }
.vcard-sub { font-size: .72rem; font-weight: 600; color: #555; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ══ GRID ══ */
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
@media (max-width: 480px) { .video-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; } }

/* ══ SKELETON ══ */
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 400% 100%; animation: shimmer 1.3s infinite; border-radius: 8px; }
.skel-card { flex: 0 0 calc(25% - 11px); min-width: 220px; }
.skel-thumb { aspect-ratio: 16/9; border-radius: 10px; }
.skel-title { height: 11px; margin-top: 8px; width: 85%; }
.skel-sub   { height: 9px;  margin-top: 4px; width: 55%; }

/* ══ WATCH PAGE ══ */
.watch-page { padding-top: 60px; }

/* Desktop: two-column grid */
.watch-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; }

/* ── Player ── */
.player-outer { background: #000; border-radius: 14px; overflow: hidden; }
.player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
.player-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

/* Mobile: video sticky top, page scrolls normally */
@media (max-width: 960px) {
  .watch-layout { grid-template-columns: 1fr; gap: 0; padding: 0 0 80px; }
  .player-outer { border-radius: 0; position: sticky; top: 60px; z-index: 150; transition: top .3s ease; }
  .watch-col-right { padding: 0 14px; }
  .watch-info-wrap { padding: 0 14px; }
  #playlist-panel  { margin: 12px 14px 0; }
  .comments-section { margin: 0 14px; }
}


/* Placeholder keeps space for the real player when mini is active */


/* Mobile info padding */
@media (max-width: 960px) {
  .watch-info-wrap { padding: 0 14px; }
}

/* ── Filter chips (YouTube style) ── */
.watch-filter-row { display:flex; gap:8px; overflow-x:auto; padding:12px 0 4px; scrollbar-width:none; }
.watch-filter-row::-webkit-scrollbar { display:none; }
.watch-filter-chip { flex-shrink:0; padding:6px 14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:9999px; font-size:.76rem; font-weight:700; color:#aaa; cursor:pointer; transition:all .2s; white-space:nowrap; }
.watch-filter-chip.active { background:#fff; color:#000; border-color:#fff; }
.watch-filter-chip:hover:not(.active) { background:rgba(255,255,255,.14); color:#fff; }

.watch-source-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 14px 0 8px; }
.watch-source-badge { padding: 2px 9px; background: #4338ca; border-radius: 4px; font-size: .67rem; font-weight: 800; color: #fff; text-transform: uppercase; }
.watch-cat-label { font-size: .8rem; color: #777; font-weight: 600; }
.watch-next-btn { margin-left: auto; padding: 7px 16px 7px 10px; background: var(--brand); color: #000; font-size: .77rem; font-weight: 800; border-radius: 9999px; border: none; cursor: pointer; transition: background .2s; display:flex; align-items:center; gap:7px; }
.watch-next-btn:hover { background: #fff; }
.countdown-ring { flex-shrink:0; }
.watch-title { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 10px; }
.watch-meta { display: flex; align-items: center; gap: 18px; padding: 13px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.watch-stat label { font-size: .6rem; font-weight: 800; text-transform: uppercase; letter-spacing: .15em; color: #555; display: block; }
.watch-stat span  { font-size: 1rem; font-weight: 800; color: #fff; }
.watch-divider { width: 1px; height: 34px; background: var(--border); }
.share-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 9999px; font-size: .76rem; font-weight: 700; color: #ccc; cursor: pointer; transition: all .2s; margin-left: auto; }
.share-btn:hover { background: #222; color: #fff; }
.watch-desc { font-size: .83rem; color: #666; line-height: 1.65; font-weight: 500; }

/* ══ LIKE/DISLIKE ══ */
.react-row { display:flex; align-items:center; gap:8px; margin:14px 0; }
.react-btn { display:flex; align-items:center; gap:6px; padding:7px 16px; background:var(--bg2); border:1px solid var(--border2); border-radius:9999px; font-size:.78rem; font-weight:700; color:#aaa; cursor:pointer; transition:all .2s; }
.react-btn:hover { border-color:#555; color:#fff; }
.react-btn.liked  { background:rgba(34,197,94,.12);  border-color:rgba(34,197,94,.4);  color:#22c55e; }
.react-btn.disliked { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.4); color:#ef4444; }
.react-btn svg { width:15px; height:15px; fill:currentColor; }

/* ══ SHARE PANEL ══ */
.share-panel { display:none; position:absolute; right:0; top:calc(100% + 8px); background:var(--bg2); border:1px solid var(--border2); border-radius:14px; padding:10px; z-index:50; min-width:200px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
.share-panel.open { display:block; animation:fadeUp .18s ease both; }
.share-option { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px; cursor:pointer; font-size:.8rem; font-weight:700; color:#bbb; transition:all .15s; border:none; background:none; width:100%; text-align:left; }
.share-option:hover { background:rgba(255,255,255,.06); color:#fff; }
.share-option svg { width:16px; height:16px; flex-shrink:0; }
.share-wrap { position:relative; }

/* ══ COMMENTS ══ */
.comments-section { margin-top:28px; padding-top:24px; border-top:1px solid var(--border); }
/* Username setup */
.username-setup-card { background:var(--bg3); border:1px solid var(--border2); border-radius:14px; padding:20px; margin-bottom:20px; text-align:center; }
.username-setup-icon { font-size:1.8rem; margin-bottom:8px; }
.username-setup-title { font-size:.92rem; font-weight:800; color:#fff; margin-bottom:4px; }
.username-setup-desc { font-size:.75rem; color:#555; margin-bottom:14px; line-height:1.5; }
.username-setup-row { text-align:left; }
.username-display-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.username-display-name { font-size:.82rem; font-weight:800; color:#ddd; }
.username-display-badge { font-size:.62rem; font-weight:800; color:#22c55e; background:rgba(34,197,94,.1); padding:2px 8px; border-radius:9999px; border:1px solid rgba(34,197,94,.2); }
.comments-title { font-size:.95rem; font-weight:800; color:#fff; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.comment-form { display:flex; gap:10px; margin-bottom:20px; }
.comment-avatar { width:34px; height:34px; border-radius:50%; background:var(--brand); display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:800; color:#000; flex-shrink:0; }
.comment-avatar.sm { width:26px; height:26px; font-size:.68rem; }
.comment-input-wrap { flex:1; }
.comment-name-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.comment-name-input { flex:1; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:7px 12px; color:var(--text); font-size:.78rem; outline:none; font-family:inherit; transition:border-color .2s; }
.comment-name-input:focus { border-color:var(--brand); }
.comment-name-input:disabled { opacity:.5; cursor:not-allowed; }
.name-locked-badge { font-size:.65rem; color:#22c55e; font-weight:700; white-space:nowrap; }
.comment-text-input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; padding:9px 12px; color:var(--text); font-size:.82rem; outline:none; resize:none; min-height:72px; font-family:inherit; transition:border-color .2s; }
.comment-text-input:focus { border-color:var(--brand); }
.comment-submit { margin-top:6px; padding:7px 18px; background:var(--brand); color:#000; font-size:.76rem; font-weight:800; border:none; border-radius:9999px; cursor:pointer; transition:all .2s; }
.comment-submit:hover { background:#fff; }
.comment-item { display:flex; gap:10px; margin-bottom:14px; }
.comment-body { flex:1; min-width:0; }
.comment-author { font-size:.78rem; font-weight:800; color:#ddd; margin-bottom:3px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.comment-time { font-size:.65rem; color:#555; font-weight:500; }
.comment-text { font-size:.82rem; color:#888; line-height:1.6; margin-bottom:6px; }
.comment-actions { display:flex; align-items:center; gap:12px; }
.comment-reply-btn { background:none; border:none; color:#555; font-size:.72rem; font-weight:700; cursor:pointer; padding:0; transition:color .2s; }
.comment-reply-btn:hover { color:var(--brand); }
.comment-delete { background:none; border:none; color:#444; font-size:.7rem; cursor:pointer; padding:2px 6px; border-radius:4px; transition:all .2s; }
.comment-delete:hover { color:#ef4444; background:rgba(239,68,68,.1); }
/* Nested replies */
.replies-wrap { margin-top:10px; padding-left:14px; border-left:2px solid rgba(255,255,255,.06); display:flex; flex-direction:column; gap:10px; }
.reply-form-wrap { margin-top:8px; }
.reply-form { display:flex; gap:8px; }
.reply-text-input { flex:1; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:7px 11px; color:var(--text); font-size:.78rem; outline:none; resize:none; min-height:54px; font-family:inherit; transition:border-color .2s; }
.reply-text-input:focus { border-color:var(--brand); }
.reply-submit { align-self:flex-end; padding:6px 14px; background:var(--brand); color:#000; font-size:.72rem; font-weight:800; border:none; border-radius:9999px; cursor:pointer; transition:all .2s; }
.reply-submit:hover { background:#fff; }
.reply-cancel { align-self:flex-end; padding:6px 10px; background:none; border:1px solid var(--border2); color:#666; font-size:.72rem; font-weight:700; border-radius:9999px; cursor:pointer; margin-left:4px; transition:all .2s; }
.reply-cancel:hover { color:#fff; border-color:#555; }
.view-more-replies { background:none; border:none; color:var(--brand); font-size:.72rem; font-weight:700; cursor:pointer; padding:4px 0; transition:opacity .2s; }
.view-more-replies:hover { opacity:.75; }
.replying-to { font-size:.7rem; color:#555; margin-bottom:4px; }
.comments-empty { font-size:.82rem; color:#444; padding:16px 0; }
.comments-loading { display:flex; gap:6px; align-items:center; color:#444; font-size:.78rem; padding:10px 0; }

/* ══ PLAYLIST PROGRESS ══ */
.pl-item.watched .pl-thumb::after { content:'✓'; position:absolute; inset:0; background:rgba(34,197,94,.35); display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:#fff; font-weight:900; }
.pl-watched-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; flex-shrink:0; margin-left:auto; }

.playlist-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 18px; }
.playlist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.playlist-label { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .15em; color: #555; }
.playlist-progress { font-size: .7rem; font-weight: 800; background: rgba(242,125,38,.12); color: var(--brand); padding: 2px 8px; border-radius: 9999px; }
.playlist-items { max-height: 360px; overflow-y: auto; }

.pl-item { display: flex; gap: 9px; padding: 6px; border-radius: 9px; cursor: pointer; border: 1px solid transparent; transition: all .18s; }
.pl-item:hover { background: rgba(255,255,255,.04); }
.pl-item.current { background: rgba(242,125,38,.08); border-color: rgba(242,125,38,.22); }
.pl-thumb { width: 70px; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; background: #1a1a1a; flex-shrink: 0; position: relative; }
.pl-thumb img { width: 100%; height: 100%; object-fit: cover; }
.pl-thumb-overlay { position: absolute; inset: 0; background: rgba(242,125,38,.38); display: flex; align-items: center; justify-content: center; }
.pl-title { font-size: .73rem; font-weight: 700; color: #bbb; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
.pl-item.current .pl-title { color: var(--brand); }
.pl-dur { font-size: .65rem; color: #555; font-weight: 600; margin-top: 3px; }

.suggested-title { font-size: .9rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
.sugg-item { display: flex; gap: 10px; margin-bottom: 13px; cursor: pointer; }
.sugg-thumb { width: 118px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #1a1a1a; flex-shrink: 0; position: relative; }
.sugg-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.sugg-item:hover .sugg-thumb img { transform: scale(1.05); }
.sugg-dur { position: absolute; bottom: 4px; right: 4px; font-size: .61rem; font-weight: 700; background: rgba(0,0,0,.8); color: #fff; padding: 1px 5px; border-radius: 3px; }
.sugg-info { display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0; }
.sugg-title-text { font-size: .76rem; font-weight: 700; color: #bbb; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
.sugg-item:hover .sugg-title-text { color: var(--brand); }
.sugg-meta { font-size: .67rem; font-weight: 600; color: #555; }
.sugg-meta em { color: var(--brand); font-style: normal; }

/* ══ CATEGORY / SEARCH ══ */
.page-header { max-width: 1280px; margin: 0 auto; padding: 68px 24px 0; }
@media (max-width: 640px) { .page-header { padding: 58px 14px 0; } }
.page-header-row { display: flex; align-items: center; gap: 14px; padding: 24px 0 18px; }
.page-header-icon { width: 48px; height: 48px; background: rgba(242,125,38,.1); border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.page-header-icon svg { fill: var(--brand); width: 22px; height: 22px; }
.page-header-title { font-size: 1.9rem; font-weight: 900; color: #fff; letter-spacing: -.03em; }
.page-header-desc { font-size: .82rem; color: #666; margin-top: 3px; }
.page-content { max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; }
@media (max-width: 640px) { .page-content { padding: 0 14px 40px; } }

.back-btn { display: inline-flex; align-items: center; gap: 7px; font-size: .8rem; font-weight: 700; color: #777; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 18px; transition: color .2s; }
.back-btn:hover { color: #fff; }
.back-btn svg { stroke: #777; transition: stroke .2s; }
.back-btn:hover svg { stroke: #fff; }

.empty-state { text-align: center; padding: 80px 20px; }
.empty-state-icon { font-size: 2.8rem; margin-bottom: 14px; opacity: .25; }
.empty-state p { font-size: .95rem; font-weight: 700; color: #444; }

/* ══ FOOTER ══ */
footer { border-top: 1px solid var(--border); padding: 48px 32px; text-align: center; }
.footer-logo { display: inline-flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.footer-desc { font-size: .8rem; color: #555; max-width: 440px; margin: 0 auto 20px; line-height: 1.6; }
.footer-links { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
.footer-links a { font-size: .72rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .08em; transition: color .2s; }
.footer-links a:hover { color: var(--brand); }

/* ══ PAGE TRANSITIONS ══ */
.page { animation: none; }
.page.active { animation: fadeUp .28s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

/* ══ MOBILE BOTTOM NAV ══ */
#bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; z-index:300; background:rgba(10,10,10,.97); border-top:1px solid var(--border); padding:8px 0 max(8px,env(safe-area-inset-bottom)); }
#bottom-nav a { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; font-size:.58rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:.06em; text-decoration:none; padding:4px 0; transition:color .2s; }
#bottom-nav a.active, #bottom-nav a:hover { color:var(--brand); }
#bottom-nav svg { width:20px; height:20px; }
#bottom-nav-row { display:flex; align-items:center; }
@media (max-width:767px) { #bottom-nav { display:block; } body { padding-bottom:68px; } }

/* ══ HISTORY / CONTINUE WATCHING ══ */
.history-strip { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
.history-chip { flex-shrink:0; display:flex; align-items:center; gap:8px; background:#1a1a1a; border:1px solid var(--border); border-radius:9999px; padding:5px 12px 5px 5px; cursor:pointer; transition:border-color .2s; }
.history-chip:hover { border-color:var(--brand); }
.history-chip img { width:36px; height:36px; border-radius:50%; object-fit:cover; }
.history-chip-title { font-size:.72rem; font-weight:700; color:#ccc; max-width:120px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ══ SEARCH RESULTS HIGHLIGHT ══ */
.search-highlight { background:rgba(242,125,38,.18); color:var(--brand); border-radius:3px; padding:0 2px; }

/* ══ SCROLL TO TOP BTN ══ */
#scroll-top { position:fixed; bottom:80px; right:20px; z-index:250; width:38px; height:38px; background:var(--brand); border:none; border-radius:50%; color:#000; font-size:1.1rem; cursor:pointer; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(242,125,38,.4); }
#scroll-top.visible { opacity:1; pointer-events:auto; }
#scroll-top:hover { transform:scale(1.1); }
@media (max-width:767px) { #scroll-top { bottom:88px; } }

/* ══ BETTER SEARCH BAR ══ */
.search-wrap.open { width:260px; opacity:1; }
@media (max-width:480px) { .search-wrap.open { width:180px; } }

/* ══ VIDEO CARD PROGRESS BAR ══ */
.vcard-progress { position:absolute; bottom:0; left:0; height:3px; background:var(--brand); border-radius:0 0 0 10px; transition:width .3s; }

/* ══ RELATED TAG CHIPS ══ */
.tag-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.tag-chip { font-size:.68rem; font-weight:700; color:#888; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:9999px; padding:3px 10px; cursor:pointer; transition:all .2s; }
.tag-chip:hover { color:#fff; border-color:#444; background:#222; }

/* ══ LOADING OVERLAY ══ */
#page-loader { position:fixed; inset:0; background:#0a0a0a; z-index:9000; display:flex; align-items:center; justify-content:center; transition:opacity .4s; }
#page-loader.hidden { opacity:0; pointer-events:none; }
.loader-ring { width:40px; height:40px; border:3px solid #1a1a1a; border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<!-- YouTube-style top progress bar -->
<div id="nprogress">
  <div id="nprogress-bar"></div>
</div>

  <!-- ═══ PAGE LOADER ═══ -->
  <div id="page-loader">
    <div class="loader-ring"></div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast"></div>

  <!-- ═══ SCROLL TOP ═══ -->
  <button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <!-- ═══════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════ -->
  <div id="navbar">
    <div id="nav-inner">
      <div class="nav-left">
        <a href="#" onclick="goHome(event)" class="nav-logo">
          <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <span class="nav-logo-text" id="site-name">RongKun</span>
        </a>
        <div id="nprogress-spinner"></div>
        <nav class="nav-links" id="nav-cats"></nav>
      </div>

      <div class="nav-right">
        <div class="search-wrap" id="search-wrap">
          <input id="search-input" type="text" placeholder="Search..."
            onkeydown="if(event.key==='Enter') doSearch()">
          <button onclick="doSearch()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <button class="icon-btn" onclick="toggleSearch()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <a href="/admin" class="icon-btn" title="Admin">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
          </svg>
        </a>
        <button class="icon-btn hamburger" id="hamburger" onclick="toggleMobileMenu()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-search">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="mobile-search-input" type="text" placeholder="Search videos..."
          onkeydown="if(event.key==='Enter') doSearch()">
      </div>
      <div class="mobile-cats" id="mobile-cats"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       HOME PAGE
  ═══════════════════════════════════════ -->
  <div id="page-home" class="page active">

    <!-- HERO -->
    <section id="hero" onclick="heroClick()">
      <img id="hero-img" src="" alt="">
      <div class="hero-grad-main"></div>
      <div class="hero-grad-side"></div>

      <div id="hero-content">
        <div class="hero-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          Featured
        </div>
        <h1 id="hero-title">Loading...</h1>
        <p id="hero-desc"></p>
        <div class="hero-meta">
          <span id="hero-cat" class="hero-cat"></span>
          <span id="hero-views" class="hero-views"></span>
        </div>
        <button class="watch-btn" onclick="event.stopPropagation(); heroClick()">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          Watch Now
        </button>
      </div>

      <div id="hero-dots"></div>
      <button class="hero-arrow" id="hero-prev" onclick="event.stopPropagation(); slideHero(-1)">&#8249;</button>
      <button class="hero-arrow" id="hero-next" onclick="event.stopPropagation(); slideHero(1)">&#8250;</button>
    </section>

    <!-- SECTIONS -->
    <div id="home-sections"></div>
    <div id="recommended-section">
      <div class="recommended-header">
        <div class="section-icon">⚡</div>
        <span class="section-title">Recommended</span>
      </div>
      <div id="recommended-grid"></div>
      <div id="recommended-loader"></div>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24" fill="#fff" width="14" height="14" style="transform:translateX(1px)">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </div>
        <span class="nav-logo-text" id="footer-name">RongKun</span>
      </div>
      <p class="footer-desc" id="footer-desc"></p>
      <div class="footer-links" id="footer-links"></div>
    </footer>
  </div>

  <!-- ═══════════════════════════════════════
       HISTORY PAGE
  ═══════════════════════════════════════ -->
  <div id="page-history" class="page">
    <div class="page-header">
      <div class="page-header-row">
        <div class="page-header-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        </div>
        <div>
          <h1 class="page-header-title">Watch History</h1>
          <p class="page-header-desc">Recently watched videos</p>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
        <button onclick="clearHistory()" style="background:none;border:1px solid #333;color:#666;border-radius:9999px;padding:5px 14px;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#dc2626';this.style.color='#dc2626'" onmouseout="this.style.borderColor='#333';this.style.color='#666'">Clear History</button>
      </div>
      <div class="video-grid" id="history-grid"></div>
      <div class="empty-state" id="history-empty" style="display:none">
        <div class="empty-state-icon">🎬</div>
        <p>No watch history yet</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       WATCH PAGE
  ═══════════════════════════════════════ -->
  <div id="page-watch" class="page watch-page">
    <div class="watch-layout">

      <!-- Left col: Player + Info + Comments -->
      <div class="watch-col-left">

        <div class="player-outer" id="player-outer">
          <div class="player-wrap">
            <iframe id="player-iframe" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
          </div>
        </div>
        <!-- Placeholder keeps layout space when mini player is active -->



        <div class="watch-info-wrap">
          <!-- Filter chips -->
          <div class="watch-filter-row" id="watch-filter-row">
            <button class="watch-filter-chip active" onclick="setWatchFilter('all',this)">All</button>
            <button class="watch-filter-chip" onclick="setWatchFilter('related',this)">Related</button>

// ── Pages ──
// ── PROGRESS BAR ENGINE ──────────────────────────────
const NP = {
  _timer: null, _val: 0, _fake: null,
  bar: null, spin: null,
  init(){
    this.bar  = document.getElementById('nprogress-bar');
    this.spin = document.getElementById('nprogress-spinner');
  },
  set(n){
    if(!this.bar) this.init();
    this._val = Math.min(n, 0.994);
    this.bar.style.width = (this._val * 100) + '%';
    this.bar.classList.add('running');
    this.spin.classList.add('running');
  },
  start(){
    if(!this.bar) this.init();
    clearInterval(this._fake);
    this.set(0.08);
    // Fake trickle
    this._fake = setInterval(()=>{
      const gap = 1 - this._val;
      const inc = gap > .5 ? .1 : gap > .2 ? .04 : gap > .05 ? .01 : 0.005;
      this.set(this._val + inc);
    }, 300);
  },
  done(){
    if(!this.bar) this.init();
    clearInterval(this._fake);
    this.set(1);
    setTimeout(()=>{
      this.bar.style.opacity = '0';
      this.spin.classList.remove('running');
      setTimeout(()=>{
        this.bar.style.width = '0%';
        this.bar.classList.remove('running');
        this.bar.style.opacity = '';
        this._val = 0;
      }, 400);
    }, 200);
  }
};

function showPage(id,push=true){
  if(id!=="watch"){
    previousPage=id;

    // Tear down mini player when leaving watch
  }
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id===`page-${id}`));
  if(push)history.pushState({page:id},"",id==="home"?"/":"/"+id);
  window.scrollTo(0,0);
  // Update bottom nav
  document.querySelectorAll('#bottom-nav a').forEach(a=>a.classList.remove('active'));
  const bnMap={home:'bn-home',search:'bn-search',history:'bn-history'};
  if(bnMap[id]) $(bnMap[id])?.classList.add('active');
  // Reset meta for non-video pages
  if(id==='home') updateMeta({title:null, desc:'Your ultimate destination for curated video content.'});
}
window.goHome=e=>{e?.preventDefault();showPage("home");};
window.goBack=()=>{
  if(previousPage&&previousPage!==location.pathname){

function routeFromUrl(push=false){
  const path=location.pathname;
  if(path==="/"||path===""){ showPage("home",false); return; }

  // /watch/playlist-slug/ep-N  or  /watch/video-slug
  if(path.startsWith("/watch/")){
    const parts=path.slice(7).split("/"); // remove '/watch/'
    if(parts.length>=2){
      // playlist video: /watch/playlist-slug/ep-N
      const plSlug=parts[0];
      const epNum=parseInt((parts[1]||'').replace('ep-',''))||1;
      const pl=playlists.find(p=>toSlug(p.name)===plSlug);
      if(pl&&(pl.videos||[]).length){
        const vid=videos.find(v=>v.id===pl.videos[epNum-1])||videos.find(v=>v.id===pl.videos[0]);
        if(vid){ openVideo(vid.id,false); return; }
      }
    }
    if(parts.length===1){
      // single video: /watch/video-slug
      const vSlug=parts[0];
      const vid=videos.find(v=>toSlug(v.title)===vSlug);
      if(vid){ openVideo(vid.id,false); return; }
    }
    showPage("home",false); return;
  }

  // Category slug
  const slug=path.replace(/^\//, '');
  const cat=categories.find(c=>toSlug(c.name)===slug);
  if(cat){ showCatPage(cat); return; }

  // Search: /search?q=...
  if(path==='/search'){
    const q=new URLSearchParams(location.search).get('q')||'';
    if(q) doSearch(q);
    else showPage('home',false);
    return;
  }

  showPage("home",false);
}
window.addEventListener("popstate",e=>{
  if(!e.state) return routeFromUrl(false);
  if(e.state.page==="watch"&&e.state.videoId){
    openVideo(e.state.videoId,false);
  } else if(e.state.page==="cat"){
    const cat=categories.find(c=>c.id===e.state.catId);
    if(cat) showCatPage(cat);
    else routeFromUrl(false);
  } else if(e.state.page==='search'&&e.state.q){
    doSearch(e.state.q);
  } else if(e.state.page==='history'){
    showHistoryPage();
  } else if(e.state.page){
    showPage(e.state.page,false);
  }
});

// ── Load Data ──
async function loadAll(){
  try{
    const[catSnap,plSnap,vidSnap,secSnap]=await Promise.all([
      getDocs(collection(db,"categories")),
      getDocs(collection(db,"playlists")),
      getDocs(query(collection(db,"videos"),orderBy("createdAt","desc"))),
      getDocs(collection(db,"home_sections")).catch(()=>({docs:[]}))
    ]);
    categories=catSnap.docs.map(d=>({id:d.id,...d.data()}));
    playlists=plSnap.docs.map(d=>({id:d.id,...d.data()}));
    videos=vidSnap.docs.map(d=>({id:d.id,...d.data()}));
    sections=secSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.display_order||0)-(b.display_order||0));

    const stDoc=await getDoc(doc(db,"settings","main")).catch(()=>null);
    if(stDoc?.exists()){
      const s=stDoc.data();
      if(s.name){siteName=s.name;["site-name","footer-name"].forEach(id=>{if($(id))$(id).textContent=s.name;});document.title=s.name;document.getElementById('og-site')?.setAttribute('content',s.name);}
      if(s.footer&&$("footer-desc"))$("footer-desc").textContent=s.footer;
    }else{
      ["site-name","footer-name"].forEach(id=>{if($(id))$(id).textContent=siteDefaults.name;});
      document.title=siteDefaults.name;
      if($("footer-desc"))$("footer-desc").textContent=siteDefaults.footer;
    }

    buildNav();buildHero();buildSections();
    initRecommended();
    setupRecObserver();
    routeFromUrl(false);
    // Hide loader
    const loader=$('page-loader');
    if(loader){ loader.classList.add('hidden'); setTimeout(()=>loader.remove(),500); }
    // Lazy load images with IntersectionObserver
    setupLazyLoad();
  }catch(err){
    console.error(err);
    showToast("Failed to load data","err");
    const loader=$('page-loader');
    if(loader){ loader.classList.add('hidden'); setTimeout(()=>loader.remove(),500); }
  }
}

function setupLazyLoad(){
  if(!('IntersectionObserver' in window)) return;
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ const img=e.target; if(img.dataset.src){ img.src=img.dataset.src; img.removeAttribute('data-src'); io.unobserve(img); } } });
  },{rootMargin:'200px'});
  document.querySelectorAll('img[data-src]').forEach(img=>io.observe(img));
}

// ── Nav ──
function buildNav(){
  const sorted=[...categories].sort((a,b)=>(a.display_order||0)-(b.display_order||0));
  const cats=sorted.slice(0,8);

  // slug: /drama, /music etc — always based on category name
  function slug(c){ return '/'+c.name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

  function navLink(c, closeMobile=false){
    const close=closeMobile?'toggleMobileMenu();':'';
    return `<a href="${slug(c)}" onclick="event.preventDefault();${close}navGo('${c.id}')">${c.name}</a>`;
  }

  const curSlug=location.pathname;
  $("nav-cats").innerHTML=`<a href="/" onclick="goHome(event)" class="${curSlug==='/'?'active':''}">Home</a>`+cats.map(c=>{
    const s=slug(c); return navLink(c).replace('<a ','<a '+(curSlug===s?'class="active" ':''));
  }).join("");
  $("mobile-cats").innerHTML=cats.map(c=>navLink(c,true)).join("");
  $("footer-links").innerHTML=`<a href="/" onclick="goHome(event)">Home</a>`
    +cats.slice(0,4).map(c=>`<a href="${slug(c)}" onclick="event.preventDefault();navGo('${c.id}')">${c.name}</a>`).join("")
    +`<a href="/about">About</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/contact">Contact</a><a href="/admin">Admin</a>`;
}

// Single entry point for all nav category clicks
window.navGo=(id)=>{
  const c=categories.find(x=>x.id===id); if(!c)return;
  NP.start();
  const ids=c.target_ids||(c.target_id?[c.target_id]:[]);
  const slug='/'+c.name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  history.pushState({page:'cat',catId:id},"",slug);
  if(c.target_type==='playlist'&&ids.length){
    openCategoryById(id);
  } else if(c.target_type==='video'&&ids.length){
    openCategoryById(id);
  } else {
    openCategory(id, c.name, false);
  }
  NP.done();
};

// ── Card ──
function buildCard(v){
  const pl=playlists.find(p=>(p.videos||[]).includes(v.id));
  const epNum=pl?(pl.videos||[]).indexOf(v.id)+1:0;
  const watchUrl=pl?`/watch/${toSlug(pl.name)}/ep-${epNum}`:`/watch/${toSlug(v.title)}`;
  const click=pl?`openPlaylist('${pl.id}','${v.id}')`:`openVideo('${v.id}')`;
  return`<a class="vcard" href="${watchUrl}" onclick="event.preventDefault();${click}">
    <div class="vcard-thumb">
      <img src="${getThumb(v)}" alt="${(v.title||"").replace(/"/g,"")}" loading="lazy"
        onerror="this.src='https://picsum.photos/seed/${v.id}x/800/450'">
      <div class="vcard-overlay"></div>
      <div class="vcard-play"><div class="vcard-play-icon">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div></div>
      ${v.duration?`<div class="vcard-duration">${v.duration}</div>`:""}
      ${pl?`<div class="vcard-series">Series</div>`:""}
    </div>
    <div class="vcard-title">${v.title||""}</div>
    <div class="vcard-sub">${v.category||""}${v.duration?` · ${v.duration}`:""}</div>
  </a>`;
}

function skelRow(n=4){return Array(n).fill(0).map(()=>`<div class="skel-card"><div class="skeleton skel-thumb"></div><div class="skeleton skel-title"></div><div class="skeleton skel-sub"></div></div>`).join("");}

function renderGrid(el,list){
  if(!el)return;
  el.innerHTML=list.length
    ?list.map(v=>buildCard(v)).join("")
    :`<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🎬</div><p>No videos found</p></div>`;
}

// ── Hero ──
function buildHero(){
  const feat=videos.filter(v=>v.featured==="yes"||v.is_featured===1||v.is_featured===true);
  heroVideos=feat.length?feat.slice(0,8):videos.slice(0,6);
  heroIndex=0;
  $("hero-dots").innerHTML=heroVideos.map((_,i)=>
    `<button class="hero-dot${i===0?" active":""}" onclick="event.stopPropagation();goToHeroSlide(${i})"></button>`
  ).join("");
  updateHero(0);resetHeroTimer();
}

function updateHero(i){
  const v=heroVideos[i];if(!v)return;
  window._currentHeroId=v.id;
  const img=$("hero-img");
  img.style.opacity="0";
  setTimeout(()=>{img.src=getThumb(v);img.style.opacity="1";},260);

  // Title — clean truncation
  $("hero-title").textContent=v.title?.length>72?v.title.slice(0,72)+"…":v.title||"";

  // Description — show real desc or smart fallback
  const desc=v.description||(v.category?`A ${v.category} video from ${v.platform||'our collection'}.`:"");
  $("hero-desc").textContent=desc;
  $("hero-desc").style.display=desc?"":"none";

  // Category badge
  $("hero-cat").textContent=v.category||"";
  $("hero-cat").style.display=v.category?"":"none";

  // Views — only show if > 0
  const vw=v.views||0;
  $("hero-views").textContent=vw>0?fmtViews(vw)+" views":"";
  $("hero-views").style.display=vw>0?"":"none";

  // Update hero button href
  const pl=playlists.find(p=>(p.videos||[]).includes(v.id));
  const heroUrl=pl?`/watch/${toSlug(pl.name)}/ep-${(pl.videos||[]).indexOf(v.id)+1}`:`/watch/${toSlug(v.title)}`;
  $("hero-watch-btn")?.setAttribute("data-url",heroUrl);

  document.querySelectorAll(".hero-dot").forEach((d,j)=>d.classList.toggle("active",j===i));
}

window.goToHeroSlide=i=>{heroIndex=i;updateHero(i);resetHeroTimer();};
window.slideHero=d=>{heroIndex=(heroIndex+d+heroVideos.length)%heroVideos.length;updateHero(heroIndex);resetHeroTimer();};
window.heroClick=()=>{
  if(!window._currentHeroId)return;
  const v=videos.find(x=>x.id===window._currentHeroId);
  if(!v)return;
  const pl=playlists.find(p=>(p.videos||[]).includes(v.id));
  if(pl) openPlaylist(pl.id,v.id);
  else openVideo(v.id);
};

function resetHeroTimer(){
  clearInterval(heroTimer);
  if(heroVideos.length>1)heroTimer=setInterval(()=>{heroIndex=(heroIndex+1)%heroVideos.length;updateHero(heroIndex);},6000);
}

      <div class="section-left">

        <span class="section-title">Continue Watching</span>
      </div>
      <a href="/history" onclick="event.preventDefault();showHistoryPage()" class="section-more">See All ›</a>
    </div>
    <div class="cw-row hide-scroll">

            </div></div>

function buildSections(){
  const container=$("home-sections");container.innerHTML="";

  // Continue Watching at top
  buildContinueWatching(container);

  const active=sections.filter(s=>s.is_active!==0&&s.is_active!=="0");
  const list=active.length?active:[
    {id:"trending",title:"Trending Now",icon:"Flame",target_type:"trending"},
    {id:"new",title:"New Arrivals",icon:"Sparkles",target_type:"latest"}
  ];
  list.forEach(sec=>{
    const rowId=`row-${sec.id}`;
    const el=document.createElement("div");
    el.className="section";
    el.innerHTML=`
      <div class="section-header">
        <div class="section-left">
          <div class="section-icon">${ICONS[sec.icon]||"▶"}</div>
          <span class="section-title">${sec.title}</span>
        </div>
        <a href="/${toSlug(sec.title)}" class="section-more" onclick="event.preventDefault();seeAll('${sec.id}')">View All ›</a>
      </div>
      <div class="row-wrap">
        <button class="row-btn prev" onclick="scrollRow('${rowId}',-1)">&#8249;</button>
        <div class="row hide-scroll" id="${rowId}">${skelRow()}</div>
        <button class="row-btn next" onclick="scrollRow('${rowId}',1)">&#8250;</button>
      </div>`;

function buildPlaylistCard(pl){
  const count=(pl.videos||[]).length;
  const thumbVids=(pl.videos||[]).slice(0,4).map(id=>videos.find(v=>v.id===id)).filter(Boolean);
  const watchUrl=`/watch/${toSlug(pl.name)}/ep-1`;

  // Netflix-style multi-thumb grid
  let thumbHtml='';
  if(thumbVids.length>=4){
    thumbHtml=`<div class="pl-multithumb-grid">
      ${thumbVids.map(v=>`<img src="${getThumb(v)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${v.id}/320/180'">`).join('')}
    </div>`;
  } else {
    const img=pl.thumbnail||(thumbVids[0]?getThumb(thumbVids[0]):`https://picsum.photos/seed/${pl.id}/800/450`);
    thumbHtml=`<div class="pl-multithumb-single"><img src="${img}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${pl.id}/800/450'"></div>`;
  }

  return`<a class="vcard" href="${watchUrl}" onclick="event.preventDefault();openPlaylistById('${pl.id}')">
    <div class="pl-multithumb">
      ${thumbHtml}
      <div class="pl-multithumb-overlay"></div>
      <div class="pl-multithumb-play"><div class="vcard-play-icon">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div></div>
      <div class="pl-ep-badge">▶ ${count} EP</div>
      <div class="pl-series-badge">Series</div>
    </div>
    <div class="vcard-title">${pl.name||""}</div>
    <div class="vcard-sub">${pl.description||`${count} episode${count!==1?"s":""}`}</div>
  </a>`;
}



function fillSection(sec,rowId){
  const isTrending=sec.target_type==="trending"||sec.title?.toLowerCase().includes("trend");
  const el=$(rowId);
  if(!el) return;

  // PLAYLIST type (single) — legacy support
  if(sec.target_type==="playlist"&&sec.target_id){
    const pl=playlists.find(p=>p.id===sec.target_id);
    el.innerHTML=pl?buildPlaylistCard(pl):`<div style="padding:1rem;color:#555;font-size:.82rem">Playlist not found.</div>`;
    return;
  }
  // MULTI_PLAYLIST — show one card per playlist
  if(sec.target_type==="multi_playlist"&&(sec.playlist_ids||[]).length){
    const cards=(sec.playlist_ids||[])
      .map(id=>playlists.find(p=>p.id===id)).filter(Boolean)
      .map(pl=>buildPlaylistCard(pl)).join("");
    el.innerHTML=cards||`<div style="padding:1rem;color:#555;font-size:.82rem">No playlists found.</div>`;
    return;
  }
  if(sec.target_type==="single_videos"&&(sec.custom_videos||[]).length){
    const list=(sec.custom_videos||[]).map(id=>videos.find(v=>v.id===id)).filter(Boolean);
    el.innerHTML=list.length?list.map(v=>buildCard(v)).join(""):skelRow();
    return;
  }
  if(sec.target_type==="category"&&sec.target_id){
    const cat=categories.find(c=>c.id===sec.target_id);
    const list=videos.filter(v=>v.category===(cat?.name||sec.target_id)||v.category_id===sec.target_id).slice(0,12);
    el.innerHTML=list.length?list.map(v=>buildCard(v)).join(""):skelRow();
    return;
  }
  let list=isTrending?[...videos].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,12):videos.slice(0,12);
  el.innerHTML=list.length?list.map(v=>buildCard(v)).join(""):skelRow();
}

window.scrollRow=(id,dir)=>{const el=$(id);if(el)el.scrollBy({left:dir*700,behavior:"smooth"});};

// ── RECOMMENDED INFINITE SCROLL ──────────────────────
let _recPool=[], _recShown=0, _recLoading=false, _recDone=false;
const REC_BATCH=12;

function initRecommended(){
  // Shuffle all videos randomly
  _recPool=[...videos].sort(()=>Math.random()-.5);
  _recShown=0; _recDone=false;
  const grid=$('recommended-grid');
  const loader=$('recommended-loader');
  if(grid) grid.innerHTML='';
  if(loader) loader.textContent='';
  loadMoreRecommended();
}

function loadMoreRecommended(){
  if(_recLoading||_recDone) return;
  _recLoading=true;
  const grid=$('recommended-grid');
  const loader=$('recommended-loader');
  if(loader) loader.textContent='Loading...';

  const batch=_recPool.slice(_recShown, _recShown+REC_BATCH);
  if(!batch.length){ _recDone=true; if(loader) loader.textContent=''; _recLoading=false; return; }

  setTimeout(()=>{
    if(grid) grid.innerHTML+=batch.map(v=>buildCard(v)).join('');
    _recShown+=batch.length;
    if(_recShown>=_recPool.length) _recDone=true;
    if(loader) loader.textContent=_recDone?'':' ';
    _recLoading=false;
  }, 100);
}

// Observe recommended loader for infinite scroll
function setupRecObserver(){
  const loader=$('recommended-loader');
  if(!loader) return;
  const obs=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting && !_recDone) loadMoreRecommended();
  },{rootMargin:'200px'});
  obs.observe(loader);
}
window.seeAll=sid=>{
  NP.start();
  const sec=sections.find(s=>s.id===sid);
  if(!sec){ showPage("cat"); return; }

  // Category type — go to proper /slug URL
  if(sec.target_type==="category"&&sec.target_id){
    const cat=categories.find(c=>c.id===sec.target_id);
    if(cat){ navGo(cat.id); return; }
  }

  // For any other type — build a virtual category page
  const slug='/'+toSlug(sec.title||'all');
  history.pushState({page:'cat',secId:sid},"",slug);
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id==="page-cat"));
  window.scrollTo(0,0);
  $("cat-title").textContent=sec.title||"All Videos";
  $("cat-desc").textContent=`Browse all ${sec.title||""} content.`;
  updateMeta({title:sec.title, desc:`Browse all ${sec.title} content`, url:location.href});

  let list=[];
  if(sec.target_type==="multi_playlist"||sec.target_type==="playlist"){
    const ids=sec.playlist_ids||[sec.target_id].filter(Boolean);
    ids.forEach(pid=>{ const pl=playlists.find(p=>p.id===pid); if(pl)(pl.videos||[]).forEach(vid=>{ if(!list.find(v=>v.id===vid)){const v=videos.find(x=>x.id===vid);if(v)list.push(v);} }); });
  } else if(sec.target_type==="single_videos"){
    list=(sec.custom_videos||[]).map(id=>videos.find(v=>v.id===id)).filter(Boolean);
  } else {
    list=[...videos].sort((a,b)=>sec.target_type==="trending"?(b.views||0)-(a.views||0):0);
  }
  renderGrid($("cat-grid"),list);
};

// ── Watch ──
window.openVideo=async (id,push=true)=>{
  NP.start();


  // Save current URL as previous page before navigating (for back button)
  if(push) previousPage=location.pathname;
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-watch'));
  window.scrollTo(0,0);
  playlistQueue=[];plQueueIdx=0;
  $("player-iframe").src="";
  $("playlist-panel").style.display="none";
  $("suggested-list").style.display="";
  $("watch-next-btn").style.display="none";
  clearCountdown();
  // Reset filter chips
  document.querySelectorAll('.watch-filter-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('.watch-filter-chip')?.classList.add('active');
  const chipPl=$("chip-playlist");
  if(chipPl)chipPl.style.display='none';
  $("suggested-list").innerHTML=skelRow(3);

  const v=videos.find(x=>x.id===id);if(!v)return;

  // Build watch URL
  if(push){
    const pl2=playlists.find(p=>(p.videos||[]).includes(id));
    if(pl2){
      const epNum=(pl2.videos||[]).indexOf(id)+1;
      const watchUrl=`/watch/${toSlug(pl2.name)}/ep-${epNum}`;
      history.pushState({page:'watch',videoId:id},"",watchUrl);
    } else {
      history.pushState({page:'watch',videoId:id},"",`/watch/${toSlug(v.title)}`);
    }
  }

  $("player-iframe").src=getEmbedUrl(v);
  $("watch-title").textContent=v.title||"";
  $("watch-source").textContent=v.platform||v.source||"";
  $("watch-cat").textContent=v.category||"";
  $("watch-views").textContent=fmtViews((v.views||0)+1);
  $("watch-date").textContent=v.createdAt?.toDate?v.createdAt.toDate().toLocaleDateString():"—";
  $("watch-desc").textContent=v.description||`${v.category||""} content from ${v.platform||v.source||""}.`;

  // SEO + History
  addToHistory(id);
  updateMeta({ title:v.title, desc:v.description||`Watch ${v.title} on ${siteName}`, image:getThumb(v), url:location.href });

  // Related tags
  const tagsEl=document.getElementById('watch-tags');
  if(tagsEl){
    const related=videos.filter(x=>x.category===v.category&&x.id!==id).slice(0,6);
    tagsEl.innerHTML=v.category?`<div class="tag-chips"><span class="tag-chip" onclick="doSearch('${v.category}')">${v.category}</span>${related.map(r=>`<span class="tag-chip" onclick="openVideo('${r.id}')">${(r.title||'').slice(0,28)}…</span>`).join('')}</div>`:'';
  }

  updateDoc(doc(db,"videos",id),{views:increment(1)}).catch(()=>{});
  const lv=videos.find(x=>x.id===id);if(lv)lv.views=(lv.views||0)+1;

  // Playlist
  const pl=playlists.find(p=>(p.videos||[]).includes(id));
  if(pl&&(pl.videos||[]).length>1){
    playlistQueue=(pl.videos||[]).map(vid=>videos.find(v=>v.id===vid)).filter(Boolean);
    plQueueIdx=playlistQueue.findIndex(v=>v.id===id);
    $("playlist-progress").textContent=`${plQueueIdx+1} / ${playlistQueue.length}`;
    const watchedIds=getHistory();
    $("playlist-items").innerHTML=playlistQueue.map((pv,pi)=>{
      const isWatched=watchedIds.includes(pv.id);
      const isCurrent=pv.id===id;
      return`<a class="pl-item${isCurrent?' current':''}${isWatched&&!isCurrent?' watched':''}"
        href="/watch/${toSlug(pl.name)}/ep-${pi+1}"
        onclick="event.preventDefault();openVideo('${pv.id}')">
        <div class="pl-thumb">
          <img src="${getThumb(pv)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${pv.id}/320/180'">
          ${isCurrent?`<div class="pl-thumb-overlay"><svg width="11" height="11" fill="#fff" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;justify-content:center;min-width:0;flex:1">
          <div class="pl-title">${pv.title||""}</div>
          ${pv.duration?`<div class="pl-dur">${pv.duration}</div>`:''}
        </div>
        ${isWatched&&!isCurrent?`<div class="pl-watched-dot" title="Watched"></div>`:''}
      </a>`;
    }).join("");
    $("playlist-panel").style.display="";
    // Show playlist chip on mobile
    const chipPl=$("chip-playlist");
    if(chipPl){ chipPl.style.display=''; chipPl.textContent=`📋 ${pl.name}`; }
    if(playlistQueue[plQueueIdx+1]){
      $("watch-next-btn").style.display="";
    }
  }

  // Smarter related videos — same category first, then others
  const sameCat=videos.filter(x=>x.id!==id&&x.category===v.category);
  const others=videos.filter(x=>x.id!==id&&x.category!==v.category);
  const related=[...sameCat,...others].slice(0,10);
  const watched=getHistory();
  $("suggested-list").innerHTML=related.map(x=>{
    const xpl=playlists.find(p=>(p.videos||[]).includes(x.id));
    const xUrl=xpl?`/watch/${toSlug(xpl.name)}/ep-${(xpl.videos||[]).indexOf(x.id)+1}`:`/watch/${toSlug(x.title)}`;
    const xClick=xpl?`openPlaylist('${xpl.id}','${x.id}')`:`openVideo('${x.id}')`;
    const isWatched=watched.includes(x.id);
    return`<a class="sugg-item" href="${xUrl}" onclick="event.preventDefault();${xClick}">
      <div class="sugg-thumb">
        <img src="${getThumb(x)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${x.id}/320/180'">
        ${x.duration?`<div class="sugg-dur">${x.duration}</div>`:""}
        ${isWatched?`<div style="position:absolute;top:4px;right:4px;background:rgba(34,197,94,.85);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#fff">✓</div>`:""}
      </div>
      <div class="sugg-info">
        <div class="sugg-title-text">${x.title||""}</div>
        <div class="sugg-meta"><em>${x.category||x.platform||""}</em> · ${fmtViews(x.views)} views${xpl?' · Series':''}</div>
      </div>
    </a>`;
  }).join("");

  // Load likes/dislikes + comments for this video
  loadReactions(id);
  loadComments(id);
  NP.done();
  // Setup mini player observer
};

window.openPlaylist=(plId,startId)=>{
  const pl=playlists.find(p=>p.id===plId);
  if(!pl||!(pl.videos||[]).length){openVideo(startId);return;}
  const i=pl.videos.indexOf(startId);
  openVideo(pl.videos[i>=0?i:0]);
};
let _countdownTimer=null;
const COUNTDOWN_SEC=5;
const ARC_LEN=94.2; // 2π × r(15)

function clearCountdown(){
  if(_countdownTimer){ clearInterval(_countdownTimer); _countdownTimer=null; }
  const arc=$('countdown-arc');
  const lbl=$('next-label');
  if(arc) arc.style.strokeDashoffset=ARC_LEN;
  if(lbl) lbl.textContent='Next Episode';
}

function startCountdown(){
  clearCountdown();
  const next=playlistQueue[plQueueIdx+1];
  if(!next) return;
  let remaining=COUNTDOWN_SEC;
  const arc=$('countdown-arc');
  const lbl=$('next-label');

  function tick(){
    if(arc) arc.style.strokeDashoffset=ARC_LEN*(remaining/COUNTDOWN_SEC);
    if(lbl) lbl.textContent=`Next in ${remaining}s`;
    if(remaining<=0){
      clearCountdown();
      openVideo(next.id);
      return;
    }
    remaining--;
  }
  tick();
  _countdownTimer=setInterval(tick,1000);
}

window.playNext=()=>{
  clearCountdown();
  const n=playlistQueue[plQueueIdx+1];
  if(n) openVideo(n.id);
};
