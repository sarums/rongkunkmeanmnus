<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RongKunKmeanMnus</title>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#f27d26;--bg:#0d0d0d;--bg2:#141414;--border:rgba(255,255,255,0.07)}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:#e4e4e7;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:9999px}
.hs{scrollbar-width:none}
.hs::-webkit-scrollbar{display:none}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:transform .45s cubic-bezier(.4,0,.2,1)}
#nav.up{transform:translateY(0)}
#nav.dn{transform:translateY(-100%)}
#navbar{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 28px;background:linear-gradient(to bottom,rgba(0,0,0,.95),rgba(0,0,0,0));transition:background .3s}
#navbar.solid{background:rgba(10,10,10,.97);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-ico{width:32px;height:32px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo-ico svg{fill:#fff;width:14px;height:14px;transform:translateX(1px)}
.logo-txt{font-size:1.15rem;font-weight:800;color:#fff;letter-spacing:-.02em}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a{font-size:.8rem;font-weight:600;color:#aaa;text-decoration:none;padding:5px 14px;border-radius:9999px;transition:all .2s}
.nav-links a:hover{color:#fff}
.nav-links a.active{background:var(--brand);color:#000}
.nav-right{display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;padding:7px;color:#aaa;border-radius:50%;transition:all .2s;display:flex}
.icon-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.search-box{display:flex;align-items:center;background:#1a1a1a;border:1px solid var(--border);border-radius:9999px;overflow:hidden;width:0;opacity:0;transition:width .3s,opacity .3s}
.search-box.open{width:220px;opacity:1}
.search-box input{background:none;border:none;outline:none;color:#fff;font-size:.85rem;padding:6px 14px;width:100%;font-family:inherit}
.search-box button{background:none;border:none;cursor:pointer;color:#888;padding:0 12px 0 0}
.mobile-menu{display:none;background:rgba(8,8,8,.98);border-bottom:1px solid var(--border);padding:14px 20px}
.mobile-menu.open{display:block}
.mobile-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.mobile-links a{font-size:.82rem;font-weight:600;color:#aaa;text-decoration:none;padding:5px 0}

/* HERO - full width WeTV style */
#hero{position:relative;width:100%;overflow:hidden;cursor:pointer;background:#000}
#hero-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .7s}
#hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.3) 45%,rgba(0,0,0,.05) 100%)}
#hero-overlay2{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.6) 0%,transparent 60%)}
#hero-content{position:absolute;bottom:0;left:0;right:0;padding:32px 40px;z-index:2}
@media(max-width:640px){#hero-content{padding:20px 16px}#hero{aspect-ratio:16/9}}
@media(min-width:641px){#hero{aspect-ratio:21/9}}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--brand);color:#000;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:9999px;margin-bottom:10px}
#hero-title{font-size:clamp(1.6rem,4vw,3.4rem);font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
#hero-desc{font-size:.9rem;color:rgba(255,255,255,.75);max-width:480px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:16px}
.hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.hero-cat{font-size:.72rem;font-weight:700;padding:3px 10px;border:1px solid rgba(255,255,255,.3);border-radius:9999px;color:#ddd}
.hero-views{font-size:.75rem;font-weight:600;color:#aaa}
.watch-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 28px;background:var(--brand);color:#000;font-size:.85rem;font-weight:800;border-radius:9999px;text-decoration:none;border:none;cursor:pointer;transition:all .2s;letter-spacing:-.01em}
.watch-btn:hover{background:#fff;transform:scale(1.03)}
.watch-btn svg{fill:currentColor;width:14px;height:14px;transform:translateX(1px)}
.hero-dots{position:absolute;bottom:20px;right:36px;display:flex;gap:6px;z-index:3}
.hero-dot{width:6px;height:6px;border-radius:9999px;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:all .3s}
.hero-dot.on{width:22px;background:var(--brand)}
.hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:40px;height:40px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s,background .2s;outline:none}
.hero-arrow:hover{background:var(--brand);border-color:var(--brand)}
#hero:hover .hero-arrow{opacity:1}
#hero-prev{left:14px}
#hero-next{right:14px}

/* SECTIONS */
.sections{max-width:1480px;margin:0 auto;padding:20px 28px 60px}
.section{margin-bottom:36px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:1.1rem;font-weight:800;color:#fff}
.sec-more{font-size:.75rem;font-weight:700;color:#888;text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .2s}
.sec-more:hover{color:var(--brand)}
.row-wrap{position:relative}
.row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.row.hs{scrollbar-width:none}
.row-btn{position:absolute;top:50%;transform:translateY(-60%);z-index:5;width:36px;height:56px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s;outline:none}
.row-btn:hover{background:var(--brand);border-color:var(--brand)}
.row-wrap:hover .row-btn{opacity:1}
.row-btn.prev{left:-14px}
.row-btn.next{right:-14px}

/* POSTER CARD - WeTV portrait style */
.pcard{flex:0 0 160px;cursor:pointer;text-decoration:none;display:block}
@media(max-width:640px){.pcard{flex:0 0 130px}}
.pcard-img-wrap{position:relative;aspect-ratio:2/3;border-radius:10px;overflow:hidden;background:#1a1a1a;margin-bottom:8px}
.pcard-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.pcard:hover .pcard-img-wrap img{transform:scale(1.06)}
.pcard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 55%);opacity:0;transition:opacity .3s}
.pcard:hover .pcard-overlay{opacity:1}
.pcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.pcard:hover .pcard-play{opacity:1}
.pcard-play-ico{width:42px;height:42px;background:rgba(242,125,38,.9);border-radius:50%;display:flex;align-items:center;justify-content:center}
.pcard-play-ico svg{fill:#fff;width:16px;height:16px;transform:translateX(1.5px)}
.pcard-rank{position:absolute;bottom:2px;left:7px;font-size:3.2rem;font-weight:900;color:rgba(255,255,255,.9);line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.9);font-family:'Outfit',sans-serif}
.pcard-dur{position:absolute;bottom:6px;right:7px;font-size:.67rem;font-weight:700;background:rgba(0,0,0,.75);color:#fff;padding:2px 6px;border-radius:4px}
.pcard-title{font-size:.78rem;font-weight:700;color:#ddd;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3;transition:color .2s}
.pcard:hover .pcard-title{color:var(--brand)}
.pcard-sub{font-size:.68rem;font-weight:600;color:#666;margin-top:3px}

/* GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
@media(max-width:480px){.pgrid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}}

/* SKELETON */
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,#1a1a1a 25%,#242424 50%,#1a1a1a 75%);background-size:400% 100%;animation:sh 1.3s infinite;border-radius:8px}
.skel-card{flex:0 0 160px}
.skel-poster{aspect-ratio:2/3;border-radius:10px}
.skel-txt{height:12px;margin-top:8px;width:80%}
.skel-txt2{height:10px;margin-top:5px;width:50%}

/* PLAYER */
.player-iframe{width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;border:1px solid var(--border)}
.player-iframe iframe{width:100%;height:100%}

/* TOAST */
#toast{position:fixed;top:18px;right:18px;z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:7px}
.t{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:9999px;font-size:.78rem;font-weight:700;transform:translateX(130%);opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap}
.t.in{transform:none;opacity:1}
.t.ok{background:#15803d;color:#fff}
.t.err{background:#dc2626;color:#fff}
.t.info{background:#2563eb;color:#fff}

/* PAGES */
.page{display:none;min-height:100vh}
.page.on{display:block}

/* WATCH */
.watch-grid{display:grid;grid-template-columns:1fr 340px;gap:28px;max-width:1280px;margin:0 auto;padding:0 24px 60px}
@media(max-width:900px){.watch-grid{grid-template-columns:1fr;padding:0 14px 40px}}
.watch-info-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:16px 0 10px}
.watch-title{font-size:1.3rem;font-weight:800;color:#fff;line-height:1.2}
.watch-meta{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:10px 0}
.watch-stat label{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#555;display:block}
.watch-stat span{font-size:1.05rem;font-weight:800;color:#fff}
.share-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:9999px;font-size:.78rem;font-weight:700;color:#ddd;cursor:pointer;transition:all .2s;font-family:inherit}
.share-btn:hover{background:#222;color:#fff}
.pl-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px}
.pl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pl-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#555}
.pl-prog{font-size:.72rem;font-weight:800;background:rgba(242,125,38,.12);color:var(--brand);padding:2px 9px;border-radius:9999px}
.pl-item{display:flex;gap:9px;padding:7px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .18s;text-decoration:none}
.pl-item:hover{background:rgba(255,255,255,.04)}
.pl-item.cur{background:rgba(242,125,38,.08);border-color:rgba(242,125,38,.25)}
.pl-thumb{width:72px;aspect-ratio:16/9;border-radius:7px;overflow:hidden;background:#1a1a1a;flex-shrink:0;position:relative}
.pl-thumb img{width:100%;height:100%;object-fit:cover}
.pl-info{display:flex;flex-direction:column;justify-content:center;min-width:0;gap:3px}
.pl-vtitle{font-size:.75rem;font-weight:700;color:#ccc;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.pl-item.cur .pl-vtitle{color:var(--brand)}
.pl-vdur{font-size:.67rem;font-weight:600;color:#555}
.sugg-item{display:flex;gap:11px;cursor:pointer;text-decoration:none;margin-bottom:14px}
.sugg-thumb{width:120px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#1a1a1a;flex-shrink:0;position:relative}
.sugg-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.sugg-item:hover .sugg-thumb img{transform:scale(1.05)}
.sugg-dur{position:absolute;bottom:4px;right:4px;font-size:.62rem;font-weight:700;background:rgba(0,0,0,.8);color:#fff;padding:1px 5px;border-radius:3px}
.sugg-info{display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0}
.sugg-title{font-size:.78rem;font-weight:700;color:#ccc;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3}
.sugg-item:hover .sugg-title{color:var(--brand)}
.sugg-meta{font-size:.68rem;font-weight:600;color:#555}
.sugg-meta span{color:var(--brand)}

/* CATEGORY / SEARCH */
.page-header{padding:60px 24px 0;max-width:1280px;margin:0 auto}
@media(max-width:640px){.page-header{padding:52px 14px 0}}
.page-hrow{display:flex;align-items:center;gap:14px;padding:28px 0 20px}
.page-hico{width:50px;height:50px;background:rgba(242,125,38,.1);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page-hico svg{fill:var(--brand);width:24px;height:24px}
.page-htitle{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-.03em}
.page-hdesc{font-size:.85rem;color:#666;margin-top:3px}
.page-grid{max-width:1280px;margin:0 auto;padding:0 24px 60px}
@media(max-width:640px){.page-grid{padding:0 14px 40px}}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:.82rem;font-weight:700;color:#888;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:20px;transition:color .2s}
.back-btn:hover{color:#fff}
.back-btn svg{stroke:#888;transition:stroke .2s}
.back-btn:hover svg{stroke:#fff}
.next-btn{padding:9px 22px;background:var(--brand);color:#000;font-size:.78rem;font-weight:800;border-radius:9999px;border:none;cursor:pointer;font-family:inherit;transition:all .2s;flex-shrink:0}
.next-btn:hover{background:#fff}

/* LOGIN (admin redirect replaced by /admin) */
@media(max-width:1024px){
  .nav-links{display:none}
  .hamburger{display:flex!important}
}
.hamburger{display:none;padding:7px;background:none;border:none;cursor:pointer;color:#aaa}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:#444}
.empty-ico{font-size:3rem;margin-bottom:16px;opacity:.3}
.empty p{font-size:1rem;font-weight:700;color:#555}
</style>
</head>
<body>

<div id="toast"></div>

<!-- NAV -->
<div id="nav" class="up">
  <div id="navInner">
    <nav id="navbr" class="up">
      <div id="navbart" style="display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 28px;background:linear-gradient(to bottom,rgba(0,0,0,.95),rgba(0,0,0,0));transition:background .3s" id="navbg">
        <div style="display:flex;align-items:center;gap:24px">
          <a href="#" onclick="goHome(event)" class="logo">
            <div class="logo-ico"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
            <span class="logo-txt" id="siteName">RongKun</span>
          </a>
          <div class="nav-links" id="navCats"></div>
        </div>
        <div class="nav-right">
          <div class="search-box" id="searchBox">
            <input id="searchIn" type="text" placeholder="Search..." onkeydown="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
          </div>
          <button class="icon-btn" onclick="toggleSearch()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
          <a href="/admin" class="icon-btn" title="Admin"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></a>
          <button class="hamburger" id="ham" onclick="toggleMob()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
      </div>
    </nav>
    <div class="mobile-menu" id="mobMenu">
      <form onsubmit="event.preventDefault();doSearch()">
        <div style="position:relative">
          <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="mobSearch" type="text" placeholder="Search videos..." style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:9999px;padding:8px 14px 8px 34px;color:#fff;font-size:.82rem;outline:none;font-family:inherit">
        </div>
      </form>
      <div class="mobile-links" id="mobCats"></div>
    </div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="pg-home" class="page on">
  <!-- HERO -->
  <section id="hero" onclick="heroClick()">
    <img id="hero-img" src="https://picsum.photos/seed/hero/1920/1080" alt="">
    <div id="hero-overlay"></div>
    <div id="hero-overlay2"></div>
    <div id="hero-content">
      <div class="hero-badge"><svg width="12" height="12" viewBox="0 0 24 24"><polygon fill="currentColor" points="5,3 19,12 5,21"/></svg>Featured</div>
      <h1 id="hero-title">Loading...</h1>
      <p id="hero-desc" class="hero-desc"></p>
      <div class="hero-meta">
        <span id="hero-cat" class="hero-cat"></span>
        <span id="hero-views" class="hero-views"></span>
      </div>
      <button onclick="event.stopPropagation();heroClick()" class="watch-btn">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        Watch Now
      </button>
    </div>
    <div class="hero-dots" id="hero-dots"></div>
    <button class="hero-arrow" id="hero-prev" onclick="event.stopPropagation();heroSlide(-1)">&#8249;</button>
    <button class="hero-arrow" id="hero-next" onclick="event.stopPropagation();heroSlide(1)">&#8250;</button>
  </section>

  <div class="sections" id="homeSecs"></div>
</div>

<!-- WATCH PAGE -->
<div id="pg-watch" class="page" style="padding-top:72px">
  <div class="watch-grid">
    <div>
      <button class="back-btn" onclick="goBack()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <div class="player-iframe"><iframe id="playerIframe" allowfullscreen allow="autoplay"></iframe></div>
      <div class="watch-info-row">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <span id="pw-src" style="padding:2px 9px;background:#4338ca;border-radius:4px;font-size:.68rem;font-weight:800;color:#fff;text-transform:uppercase"></span>
            <span id="pw-cat" style="font-size:.8rem;color:#888;font-weight:600"></span>
          </div>
          <h1 class="watch-title" id="pw-title"></h1>
        </div>
        <button id="pw-next" onclick="playNext()" class="next-btn" style="display:none">Next ›</button>
      </div>
      <div class="watch-meta">
        <div class="watch-stat"><label>Views</label><span id="pw-views"></span></div>
        <div style="width:1px;height:36px;background:var(--border)"></div>
        <div class="watch-stat"><label>Published</label><span id="pw-date"></span></div>
        <div style="margin-left:auto">
          <button class="share-btn" onclick="copyLink()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            Share
          </button>
        </div>
      </div>
      <p id="pw-desc" style="font-size:.84rem;color:#777;line-height:1.65;font-weight:500;margin-top:8px"></p>
    </div>
    <div>
      <div class="pl-panel" id="pl-panel" style="display:none">
        <div class="pl-head">
          <span class="pl-label">Playlist</span>
          <span class="pl-prog" id="pl-prog"></span>
        </div>
        <div id="pl-items" style="max-height:380px;overflow-y:auto" class="hs"></div>
      </div>
      <h3 style="font-size:.95rem;font-weight:800;color:#fff;margin-bottom:14px">Suggested</h3>
      <div id="sugg-list"></div>
    </div>
  </div>
</div>

<!-- CATEGORY PAGE -->
<div id="pg-cat" class="page">
  <div class="page-header">
    <div class="page-hrow">
      <div class="page-hico"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
      <div>
        <h1 class="page-htitle" id="cat-title"></h1>
        <p class="page-hdesc" id="cat-desc"></p>
      </div>
    </div>
  </div>
  <div class="page-grid"><div class="pgrid" id="cat-grid"></div></div>
</div>

<!-- SEARCH PAGE -->
<div id="pg-search" class="page">
  <div class="page-header">
    <div class="page-hrow">
      <div class="page-hico"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
      <div>
        <h1 class="page-htitle">Search Results</h1>
        <p class="page-hdesc" id="srch-info"></p>
      </div>
    </div>
  </div>
  <div class="page-grid"><div class="pgrid" id="srch-grid"></div></div>
</div>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,getDocs,doc,updateDoc,increment,query,orderBy,getDoc}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const FB=initializeApp({apiKey:"AIzaSyAnXxuc92620WOz_bVkovnUEQ_LL4YFPp8",authDomain:"streamhub-ce717.firebaseapp.com",projectId:"streamhub-ce717",storageBucket:"streamhub-ce717.firebasestorage.app",messagingSenderId:"223272731262",appId:"1:223272731262:web:d17866d4a12f610c864e2f"});
const db=getFirestore(FB);

let videos=[],playlists=[],categories=[],sections=[];
let heroVids=[],heroIdx=0,heroTimer=null;
let curVid=null,curPl=[],curPlIdx=0;
let prevPg='home',lastSY=0;

const $=id=>document.getElementById(id);
const fmtN=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':(n||0)+'';
const thumb=v=>v.customThumb||v.thumbnail||(
  (v.platform||v.source||'')==='dailymotion'
  ?`https://www.dailymotion.com/thumbnail/video/${(v.videoId||v.url||'').replace(/.*\//,'')}`
  :`https://picsum.photos/seed/${v.id}/800/450`
);
const embedUrl=v=>{
  const p=v.platform||v.source||'';
  const id=(v.videoId||v.url||'').split('/').pop()||v.videoId||'';
  if(p==='dailymotion')return`https://www.dailymotion.com/embed/video/${id}?autoplay=1`;
  if(p==='rumble')return`https://rumble.com/embed/${id}/?pub=4`;
  return v.url||'';
};

// TOAST
window.toast=(msg,type='ok')=>{
  const el=document.createElement('div');
  el.className=`t ${type}`;el.textContent=msg;
  $('toast').appendChild(el);
  requestAnimationFrame(()=>setTimeout(()=>el.classList.add('in'),10));
  setTimeout(()=>{el.classList.remove('in');setTimeout(()=>el.remove(),300)},3000);
};

// NAV SCROLL
let scrollSearchOpen=false;
window.addEventListener('scroll',()=>{
  const sy=window.scrollY;
  const nav=$('nav');
  nav.classList.toggle('dn',sy>lastSY&&sy>130);
  nav.classList.toggle('up',sy<=lastSY||sy<=130);
  const bg=$('navbg');
  if(sy>70){bg.style.background='rgba(10,10,10,.97)';bg.style.borderBottom='1px solid rgba(255,255,255,.07)';}
  else{bg.style.background='linear-gradient(to bottom,rgba(0,0,0,.95),rgba(0,0,0,0))';bg.style.borderBottom='';}
  lastSY=sy;
  $('nav').style.transform=''; // always let classes handle it
});

window.toggleSearch=()=>{
  scrollSearchOpen=!scrollSearchOpen;
  $('searchBox').classList.toggle('open',scrollSearchOpen);
  if(scrollSearchOpen)setTimeout(()=>$('searchIn').focus(),50);
};
window.toggleMob=()=>$('mobMenu').classList.toggle('open');
window.doSearch=()=>{
  const q=($('searchIn').value||$('mobSearch').value||'').trim();
  if(!q)return;
  showPage('search');
  $('srch-info').textContent=`Showing results for "${q}"`;
  const r=videos.filter(v=>v.title.toLowerCase().includes(q.toLowerCase()));
  renderGrid($('srch-grid'),r);
};
window.goHome=e=>{e&&e.preventDefault();showPage('home');};

// PAGES
function showPage(id,push=true){
  if(id!=='watch')prevPg=id;
  ['home','watch','cat','search'].forEach(p=>$(`pg-${p}`).classList.toggle('on',p===id));
  if(push)history.pushState({p:id},'',id==='home'?'/':'/'+id);
  window.scrollTo(0,0);
}
window.goBack=()=>showPage(prevPg);
window.addEventListener('popstate',e=>{if(e.state?.p)showPage(e.state.p,false);});

// LOAD
async function loadAll(){
  try{
    const[cs,ps,vs,ss]=await Promise.all([
      getDocs(collection(db,'categories')),
      getDocs(collection(db,'playlists')),
      getDocs(query(collection(db,'videos'),orderBy('createdAt','desc'))),
      getDocs(collection(db,'home_sections')).catch(()=>({docs:[]}))
    ]);
    categories=cs.docs.map(d=>({id:d.id,...d.data()}));
    playlists=ps.docs.map(d=>({id:d.id,...d.data()}));
    videos=vs.docs.map(d=>({id:d.id,...d.data()}));
    sections=ss.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.display_order||0)-(b.display_order||0));

    // settings
    const stSnap=await getDoc(doc(db,'settings','main')).catch(()=>null);
    if(stSnap?.exists()){const d=stSnap.data();if(d.name)$('siteName').textContent=d.name;document.title=d.name||'RongKun';}

    buildNav();
    buildHero();
    buildSections();
  }catch(e){console.error(e);toast('Failed to load data','err');}
}

// NAV
function buildNav(){
  const cats=categories.slice(0,7);
  $('navCats').innerHTML=`<a href="#" onclick="goHome(event)" class="active">Home</a>`
    +cats.map(c=>`<a href="#" onclick="openCat('${c.id}','${c.name}')">${c.name}</a>`).join('');
  $('mobCats').innerHTML=cats.map(c=>`<a href="#" onclick="openCat('${c.id}','${c.name}');toggleMob()">${c.name}</a>`).join('');
}

// POSTER CARD
function pCard(v,rank=0){
  const pl=playlists.find(p=>(p.videos||[]).includes(v.id));
  const click=pl?`openPlaylist('${pl.id}','${v.id}')`:`openVid('${v.id}')`;
  const img=thumb(v);
  return`<a class="pcard" href="#" onclick="event.preventDefault();${click}">
    <div class="pcard-img-wrap">
      <img src="${img}" alt="${v.title||''}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${v.id}/400/600'">
      <div class="pcard-overlay"></div>
      <div class="pcard-play"><div class="pcard-play-ico"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div>
      ${rank>0?`<div class="pcard-rank">${rank}</div>`:''}
      ${v.duration?`<div class="pcard-dur">${v.duration}</div>`:''}
      ${pl?`<div style="position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);color:#ddd;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:4px">Series</div>`:''}
    </div>
    <div class="pcard-title">${v.title||''}</div>
    ${v.category?`<div class="pcard-sub">${v.category}${v.duration?` · ${v.duration}`:''}</div>`:v.duration?`<div class="pcard-sub">${v.duration}</div>`:''}
  </a>`;
}

function skelRow(n){return Array(n).fill(0).map(()=>`<div class="skel-card"><div class="skel skel-poster"></div><div class="skel skel-txt"></div><div class="skel skel-txt2"></div></div>`).join('');}
function skelGrid(n){return Array(n).fill(0).map(()=>`<div><div class="skel skel-poster"></div><div class="skel skel-txt"></div><div class="skel skel-txt2"></div></div>`).join('');}

function renderGrid(el,vids,ranked=false){
  if(!vids.length){el.innerHTML=`<div class="empty col-span-full"><div class="empty-ico">🎬</div><p>No videos found</p></div>`;return;}
  el.innerHTML=vids.map((v,i)=>pCard(v,ranked?i+1:0)).join('');
}

// HERO
function buildHero(){
  const feat=videos.filter(v=>v.featured==='yes'||v.is_featured===1||v.is_featured===true);
  heroVids=feat.length?feat.slice(0,8):videos.slice(0,6);
  $('hero-dots').innerHTML=heroVids.map((_,i)=>`<button class="hero-dot${i===0?' on':''}" onclick="event.stopPropagation();goHeroSlide(${i})"></button>`).join('');
  updateHero(0);resetHeroTimer();
}
function updateHero(i){
  const v=heroVids[i];if(!v)return;
  window._heroId=v.id;
  const img=$('hero-img');img.style.opacity=0;
  setTimeout(()=>{img.src=thumb(v);img.style.opacity='';},280);
  $('hero-title').textContent=v.title.length>70?v.title.slice(0,70)+'…':v.title;
  $('hero-desc').textContent=v.description||'';
  $('hero-cat').textContent=v.category||'';
  $('hero-views').textContent=fmtN(v.views||0)+' views';
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('on',j===i));
}
window.goHeroSlide=i=>{heroIdx=i;updateHero(i);resetHeroTimer();};
window.heroSlide=d=>{heroIdx=(heroIdx+d+heroVids.length)%heroVids.length;updateHero(heroIdx);resetHeroTimer();};
window.heroClick=()=>{if(window._heroId)openVid(window._heroId);};
function resetHeroTimer(){clearInterval(heroTimer);if(heroVids.length>1)heroTimer=setInterval(()=>{heroIdx=(heroIdx+1)%heroVids.length;updateHero(heroIdx);},6000);}

// SECTIONS
function buildSections(){
  const cont=$('homeSecs');cont.innerHTML='';
  const emojiMap={Flame:'🔥',Sparkles:'✨',Dices:'🎲',Video:'🎬',Music:'🎵',TrendingUp:'📈',Star:'⭐',List:'📋',Grid:'▦'};
  const secs=sections.filter(s=>s.is_active!==0&&s.is_active!=='0').length
    ?sections.filter(s=>s.is_active!==0&&s.is_active!=='0')
    :[{id:'t',title:'🔥 Trending Now',icon:'Flame',target_type:'trending'},{id:'n',title:'✨ New Arrivals',icon:'Sparkles',target_type:'latest'}];

  secs.forEach(sec=>{
    const el=document.createElement('div');
    el.className='section';
    const rowId=`row-${sec.id}`;
    el.innerHTML=`
      <div class="sec-head">
        <h2 class="sec-title">${emojiMap[sec.icon]||'▶'} ${sec.title}</h2>
        <a href="#" class="sec-more" onclick="event.preventDefault();seeAll('${sec.id}')">See All ›</a>
      </div>
      <div class="row-wrap">
        <button class="row-btn prev" onclick="scrollRow('${rowId}',-1)">&#8249;</button>
        <div class="row hs" id="${rowId}">${skelRow(6)}</div>
        <button class="row-btn next" onclick="scrollRow('${rowId}',1)">&#8250;</button>
      </div>`;
    cont.appendChild(el);
    fillSection(sec,rowId);
  });
}

function fillSection(sec,rowId){
  let vids=[];
  if(sec.target_type==='playlist'&&sec.target_id){
    const pl=playlists.find(p=>p.id===sec.target_id);
    vids=(pl?.videos||[]).map(id=>videos.find(v=>v.id===id)).filter(Boolean).slice(0,10);
  }else if(sec.target_type==='category'&&sec.target_id){
    const cat=categories.find(c=>c.id===sec.target_id);
    vids=videos.filter(v=>v.category===(cat?.name||sec.target_id)||v.category_id===sec.target_id).slice(0,10);
  }else if(sec.target_type==='trending'){
    vids=[...videos].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,10);
  }else{
    vids=videos.slice(0,10);
  }
  const el=$(rowId);
  if(!el)return;
  el.innerHTML=vids.length?vids.map((v,i)=>pCard(v,sec.target_type==='trending'?i+1:0)).join(''):skelRow(6);
}

window.scrollRow=(id,dir)=>{const el=$(id);if(el)el.scrollBy({left:dir*680,behavior:'smooth'});};
window.seeAll=secId=>{
  const sec=sections.find(s=>s.id===secId);
  if(sec?.target_type==='category'&&sec.target_id){const cat=categories.find(c=>c.id===sec.target_id);openCat(sec.target_id,cat?.name||sec.title);}
  else{$('cat-title').textContent='All Videos';$('cat-desc').textContent='All videos in the collection.';renderGrid($('cat-grid'),videos);showPage('cat');}
};

// VIDEO
window.openVid=async id=>{
  showPage('watch');curVid=id;curPl=[];curPlIdx=0;
  $('playerIframe').src='';$('pl-panel').style.display='none';$('pw-next').style.display='none';
  $('sugg-list').innerHTML=skelRow(3);
  const v=videos.find(x=>x.id===id);if(!v)return;
  $('playerIframe').src=embedUrl(v);
  $('pw-title').textContent=v.title;
  $('pw-src').textContent=v.platform||v.source||'';
  $('pw-cat').textContent=v.category||'';
  $('pw-views').textContent=fmtN((v.views||0)+1);
  $('pw-date').textContent=v.createdAt?.toDate?v.createdAt.toDate().toLocaleDateString():'—';
  $('pw-desc').textContent=v.description||`${v.category||''} content from ${v.platform||v.source||''}.`;
  updateDoc(doc(db,'videos',id),{views:increment(1)}).catch(()=>{});
  const lv=videos.find(x=>x.id===id);if(lv)lv.views=(lv.views||0)+1;

  // playlist
  const pl=playlists.find(p=>(p.videos||[]).includes(id));
  if(pl&&(pl.videos||[]).length>1){
    curPl=(pl.videos||[]).map(vid=>videos.find(v=>v.id===vid)).filter(Boolean);
    curPlIdx=curPl.findIndex(v=>v.id===id);
    $('pl-prog').textContent=`${curPlIdx+1} / ${curPl.length}`;
    $('pl-items').innerHTML=curPl.map((pv,i)=>`
      <div class="pl-item${pv.id===id?' cur':''}" onclick="openVid('${pv.id}')">
        <div class="pl-thumb">
          <img src="${thumb(pv)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${pv.id}/400/225'">
          ${pv.id===id?`<div style="position:absolute;inset:0;background:rgba(242,125,38,.4);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" fill="#fff" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>`:''}
        </div>
        <div class="pl-info">
          <div class="pl-vtitle">${pv.title||''}</div>
          ${pv.duration?`<div class="pl-vdur">${pv.duration}</div>`:''}
        </div>
      </div>`).join('');
    $('pl-panel').style.display='';
    if(curPl[curPlIdx+1])$('pw-next').style.display='';
  }

  // suggested
  const sug=videos.filter(x=>x.id!==id).slice(0,8);
  $('sugg-list').innerHTML=sug.map(x=>`
    <a href="#" class="sugg-item" onclick="event.preventDefault();openVid('${x.id}')">
      <div class="sugg-thumb">
        <img src="${thumb(x)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${x.id}/400/225'">
        ${x.duration?`<div class="sugg-dur">${x.duration}</div>`:''}
      </div>
      <div class="sugg-info">
        <div class="sugg-title">${x.title||''}</div>
        <div class="sugg-meta"><span>${x.platform||x.source||''}</span> · ${fmtN(x.views)} views</div>
      </div>
    </a>`).join('');
};

window.openPlaylist=(plId,startId)=>{
  const pl=playlists.find(p=>p.id===plId);
  if(!pl||!(pl.videos||[]).length){openVid(startId);return;}
  const i=pl.videos.indexOf(startId);
  openVid(pl.videos[i>=0?i:0]);
};
window.playNext=()=>{const n=curPl[curPlIdx+1];if(n)openVid(n.id);};

// CATEGORY
window.openCat=(id,name)=>{
  showPage('cat');
  $('cat-title').textContent=name||id;
  $('cat-desc').textContent=`Discover the best ${name||''} content.`;
  const cat=categories.find(c=>c.id===id||c.name===name);
  let vids=[];
  if(cat?.target_type==='playlist'&&cat.target_id){
    const pl=playlists.find(p=>p.id===cat.target_id);
    vids=videos.filter(v=>(pl?.videos||[]).includes(v.id));
  }else{
    vids=videos.filter(v=>v.category===name||v.category===id||v.category_id===id);
  }
  renderGrid($('cat-grid'),vids);
};

window.copyLink=()=>navigator.clipboard.writeText(location.href).then(()=>toast('Link copied!','ok'));

loadAll();
</script>
</body>
</html>
